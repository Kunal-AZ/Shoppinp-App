<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | Sitara Grace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="retail-mode">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="images/logo.png" alt="Project3 logo">
        <span>Sitara Grace</span>
      </a>
      <div class="search-shell">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search products">
      </div>
      <nav class="nav">
        <a href="collections.html">Collection</a>
        <a href="latest.html">Latest</a>
        <a href="story.html">Story</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <a class="auth-link" href="login.html">Login</a>
        <a class="auth-link" href="register.html">Register</a>
        <a class="nav-cta" href="cart.html">Cart <span class="cart-badge" data-cart-count>0</span></a>
      </div>
    </div>
  </header>

  <main class="payment-shell">
    <section class="payment-card">
      <p class="eyebrow">Payment method</p>
      <h2>Complete your order</h2>
      <div class="payment-grid">
        <label>
          Full name
          <input id="payment-name" type="text" placeholder="Your full name" required>
        </label>
        <label>
          Phone
          <input id="payment-phone" type="tel" placeholder="+91 98765 43210" required>
        </label>
      </div>
      <div class="payment-method-shell">
        <label>
          Payment method
          <select id="payment-method">
            <option value="">Choose a payment method</option>
            <option value="card">Credit / Debit Card</option>
            <option value="upi">UPI</option>
            <option value="banking">Net Banking</option>
            <option value="cod">Cash on Delivery</option>
          </select>
        </label>
        <p class="payment-note" id="payment-prompt">Select a payment method to continue.</p>
      </div>
      <div class="payment-fields is-hidden" id="card-fields">
        <div class="payment-grid">
          <label>
            Card number
            <input id="card-number" type="text" placeholder="1234 5678 9012 3456">
          </label>
          <label>
            Name on card
            <input id="card-holder" type="text" placeholder="Cardholder name">
          </label>
          <label>
            Expiry
            <input id="card-expiry" type="text" placeholder="MM/YY">
          </label>
          <label>
            CVV
            <input id="card-cvv" type="text" placeholder="123">
          </label>
        </div>
      </div>
      <div class="payment-fields is-hidden" id="upi-fields">
        <label>
          UPI ID
          <input id="upi-id" type="text" placeholder="yourname@upi">
        </label>
      </div>
      <div class="payment-fields is-hidden" id="bank-fields">
        <label>
          Select bank
          <select id="bank-name">
            <option>Choose your bank</option>
            <option>HDFC Bank</option>
            <option>ICICI Bank</option>
            <option>SBI</option>
            <option>Axis Bank</option>
          </select>
        </label>
      </div>
      <div class="payment-fields is-hidden" id="cod-fields">
        <p class="payment-note">Cash on Delivery selected. Pay when your order arrives.</p>
      </div>
      <button class="button button-primary" id="pay-now-button" type="button">Pay Now</button>
      <p class="form-status" id="payment-form-status" aria-live="polite"></p>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="app.js"></script>
</body>
</html>
