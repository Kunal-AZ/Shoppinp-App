<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Sitara Grace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="retail-mode">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="images/logo.png" alt="Project3 logo">
        <span>Sitara Grace</span>
      </a>
      <div class="search-shell">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search products">
      </div>
      <nav class="nav">
        <a href="collections.html">Collection</a>
        <a href="latest.html">Latest</a>
        <a href="story.html">Story</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <a class="auth-link" href="login.html">Login</a>
        <a class="auth-link" href="register.html">Register</a>
        <a class="nav-cta" href="cart.html">Cart <span class="cart-badge" data-cart-count>0</span></a>
      </div>
    </div>
  </header>

  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Account</p>
      <h2>Create your account</h2>
      <form id="register-form">
        <label>
          Full name
          <input id="register-name" type="text" placeholder="Your full name" required>
        </label>
        <label>
          Email
          <input id="register-email" type="email" placeholder="you@example.com" required>
        </label>
        <label>
          Password
          <input id="register-password" type="password" placeholder="Create a password" required>
        </label>
        <button class="button button-primary" type="submit">Register</button>
        <p class="form-status" id="register-status" aria-live="polite"></p>
      </form>
      <p>Already have an account? <a class="inline-link" href="login.html">Login here</a></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
