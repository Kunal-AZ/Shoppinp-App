<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Sitara Grace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="retail-mode">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="images/logo.png" alt="Project3 logo">
        <span>Sitara Grace</span>
      </a>
      <div class="search-shell">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search your bag">
      </div>
      <nav class="nav">
        <a href="collections.html">Collection</a>
        <a href="latest.html">Latest</a>
        <a href="story.html">Story</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <a class="auth-link" href="login.html">Login</a>
        <a class="auth-link" href="register.html">Register</a>
        <a class="nav-cta" href="cart.html">Cart <span class="cart-badge" data-cart-count>0</span></a>
      </div>
    </div>
  </header>

  <main class="catalog-shell">
    <section class="section-space">
      <div class="container catalog-topbar">
        <div>
          <p class="eyebrow">Your cart</p>
          <h2>Review selected products</h2>
        </div>
        <a class="button button-secondary" href="arrivals.html">Continue Shopping</a>
      </div>
      <div class="container cart-shell">
        <div class="cart-items" id="cart-items"></div>
        <aside class="cart-summary">
          <div class="summary-row">
            <span>Items</span>
            <strong id="summary-count">0</strong>
          </div>
          <div class="summary-row">
            <span>Subtotal</span>
            <strong id="summary-subtotal">₹0</strong>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <strong>Free</strong>
          </div>
          <a class="button button-primary" href="payment.html">Proceed to Payment</a>
          <p class="summary-note">Cart stays saved in the browser while you continue shopping.</p>
        </aside>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <div class="cart-toast" id="cart-toast" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
